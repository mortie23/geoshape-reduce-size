# Global Configuration for geoshape-reduce-size

# Tolerance for Douglas-Peucker boundary simplification (units: degrees, CRS: WGS84)
# 0.001 ≈ ~100m — good for BI dashboards. Increase to reduce file size further.
simplify_tolerance: 0.01

paths-0:
  # Path to the raw shapefile (.shp)
  raw_shapefile: "data/RA_2016_AUST.shp"
  # Path where the converted GeoJSON will be written
  geojson_output: "data/RA_2016_AUST.geojson"
  # Path to the simplified GeoJSON
  simplified_geojson: "data/RA_2016_AUST-simple.geojson"
  # Path to the dissolved output GeoJSON
  dissolved_geojson: "data/RA_2016_AUST-all.geojson"

paths:
  # Path to the raw shapefile (.shp)
  raw_shapefile: "data/ILOC_2021_AUST_GDA2020.shp"
  # Path where the converted GeoJSON will be written
  geojson_output: "data/ILOC_2021_AUST_GDA2020.geojson"
  # Path to the simplified GeoJSON
  simplified_geojson: "data/ILOC_2021_AUST_GDA2020-simple.geojson"
  # Path to the dissolved output GeoJSON
  dissolved_geojson: "data/ILOC_2021_AUST_GDA2020-all.geojson"
